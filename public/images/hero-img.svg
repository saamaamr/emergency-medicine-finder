<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#15803D" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0369A1"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="200" r="185" fill="url(#g1)" stroke="#22C55E" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="250" cy="200" r="150" fill="url(#g3)" stroke="#DCFCE7" stroke-width="2"/>

  <!-- Map base - abstract city -->
  <rect x="110" y="220" width="280" height="140" rx="16" fill="white" stroke="#e5e7eb" stroke-width="1.5" opacity="0.9"/>

  <!-- Map grid lines -->
  <line x1="140" y1="240" x2="140" y2="340" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="200" y1="240" x2="200" y2="340" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="260" y1="240" x2="260" y2="340" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="240" x2="320" y2="340" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="260" x2="370" y2="260" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="290" x2="370" y2="290" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="320" x2="370" y2="320" stroke="#DCFCE7" stroke-width="1" opacity="0.6"/>

  <!-- Road -->
  <rect x="150" y="270" width="200" height="6" rx="3" fill="#e5e7eb" opacity="0.5"/>
  <rect x="230" y="240" width="6" height="100" rx="3" fill="#e5e7eb" opacity="0.5"/>

  <!-- Map pins - pharmacy markers -->
  <g transform="translate(170, 250)">
    <path d="M0 0C0-8.8 7.2-16 16-16s16 7.2 16 16c0 8.8-16 24-16 24S0 8.8 0 0z" fill="#15803D" opacity="0.9"/>
    <circle cx="16" cy="-2" r="6" fill="white"/>
    <rect x="14" y="-6" width="4" height="8" rx="1" fill="#15803D"/>
    <rect x="12" y="-4" width="8" height="4" rx="1" fill="#15803D"/>
  </g>

  <g transform="translate(290, 280)">
    <path d="M0 0C0-8.8 7.2-16 16-16s16 7.2 16 16c0 8.8-16 24-16 24S0 8.8 0 0z" fill="#0369A1" opacity="0.9"/>
    <circle cx="16" cy="-2" r="6" fill="white"/>
    <rect x="14" y="-6" width="4" height="8" rx="1" fill="#0369A1"/>
    <rect x="12" y="-4" width="8" height="4" rx="1" fill="#0369A1"/>
  </g>

  <g transform="translate(230, 310)">
    <path d="M0 0C0-8.8 7.2-16 16-16s16 7.2 16 16c0 8.8-16 24-16 24S0 8.8 0 0z" fill="#15803D" opacity="0.9"/>
    <circle cx="16" cy="-2" r="6" fill="white"/>
    <rect x="14" y="-6" width="4" height="8" rx="1" fill="#15803D"/>
    <rect x="12" y="-4" width="8" height="4" rx="1" fill="#15803D"/>
  </g>

  <!-- User location pulsing dot -->
  <circle cx="310" cy="255" r="12" fill="#15803D" opacity="0.15">
    <animate attributeName="r" values="12;20;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="255" r="6" fill="#15803D" stroke="white" stroke-width="2"/>

  <!-- Medicine pill floating top-right -->
  <g transform="translate(360, 150)">
    <rect x="0" y="0" width="16" height="30" rx="8" fill="#22C55E" opacity="0.9"/>
    <rect x="0" y="15" width="16" height="15" rx="8" fill="#15803D" opacity="0.9"/>
    <animateTransform attributeName="transform" type="translate" values="360,150;360,145;360,150" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Medicine pill floating left -->
  <g transform="translate(120, 130)">
    <rect x="0" y="0" width="14" height="26" rx="7" fill="#0284C7" opacity="0.8"/>
    <rect x="0" y="13" width="14" height="13" rx="7" fill="#0369A1" opacity="0.8"/>
    <animateTransform attributeName="transform" type="translate" values="120,130;120,125;120,130" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- Stethoscope icon bottom -->
  <g transform="translate(400, 310)" opacity="0.6">
    <path d="M0 10a8 8 0 1 1 16 0v6a12 12 0 0 1-12 12H2a6 6 0 0 1-6-6v-2" stroke="#15803D" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="0" cy="10" r="4" fill="#15803D"/>
  </g>

  <!-- Prescription icon top-left -->
  <g transform="translate(80, 100)" opacity="0.5">
    <rect x="0" y="0" width="18" height="24" rx="2" stroke="#15803D" stroke-width="1.5" fill="none"/>
    <line x1="4" y1="8" x2="14" y2="8" stroke="#15803D" stroke-width="1.5"/>
    <line x1="4" y1="14" x2="12" y2="14" stroke="#15803D" stroke-width="1.5"/>
    <line x1="4" y1="18" x2="10" y2="18" stroke="#15803D" stroke-width="1.5"/>
  </g>

  <!-- Shield + check bottom-left -->
  <g transform="translate(100, 330)" opacity="0.5">
    <path d="M8 0L0 3v6c0 4 3 8 8 10 5-2 8-6 8-10V3L8 0z" stroke="#15803D" stroke-width="1.5" fill="none"/>
    <path d="M5 9l2 2 4-4" stroke="#15803D" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>